# environments.yml
# Environment-specific configuration for the ML pipeline.
#
# deploy.sh reads this file to resolve DB, schema, warehouse, and table names.
# Add or rename environments to match your org's naming conventions.

default:
  model_name: "CHURN_PREDICTION_MODEL"
  pipeline_name: "ML_RETRAINING_PIPELINE"
  schedule: "0 2 * * *"   # daily at 02:00 UTC (cron); set to null to deploy suspended
  service_name: "CHURN_PREDICTION_SVC"

DEV:
  database: "DEV_ML_DB"
  raw_database: "DEV_RAW_DB"
  schema: "PIPELINES"
  warehouse: "DEV_ML_WH"
  compute_pool: "DEV_ML_COMPUTE_POOL"
  image_repo: "DEV_ML_DB.PIPELINES.ML_IMAGE_REPO"
  tables:
    raw_data: "DEV_RAW_DB.PUBLIC.CUSTOMERS"
    feature_view: "DEV_ML_DB.FEATURES.CUSTOMER_FEATURES"
    inference_output: "DEV_ML_DB.OUTPUT.CHURN_PREDICTIONS"

